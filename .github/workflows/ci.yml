name: QA Automation CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Si llega un push/PR nuevo mientras un run anterior de la misma rama sigue
# corriendo, cancela el anterior en vez de dejar los dos corriendo en
# paralelo — evita gastar minutos de CI en un run que ya quedó obsoleto.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [chromium, firefox, api]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        # El proyecto "api" no abre ningún browser (usa la fixture `request`
        # de Playwright), no se instala Chromium para ese caso.
        # Se salta el step directamente.
        if: matrix.project != 'api'
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Run tests
        run: npx playwright test --project=${{ matrix.project }}
        env:
          BASE_URL_IMDB: https://www.imdb.com
          BASE_URL_POKEAPI: https://pokeapi.co/api/v2

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 14
